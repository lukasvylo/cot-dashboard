name: COT Data Update

on:
  schedule:
    # Každý pátek v 22:00 CET (21:00 UTC) — CFTC publikuje v 15:30 EST = 21:30 CET
    - cron: '0 21 * * 5'
  workflow_dispatch:
    # Možnost spustit ručně tlačítkem na GitHubu

jobs:
  update-cot-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalace závislostí
        run: pip install requests pandas

      - name: Spusť update_data.py
        run: python update_data.py

      - name: Commitni a pushni nová data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cot_supplemental.csv
          git diff --staged --quiet || git commit -m "auto: COT update $(date +'%Y-%m-%d')"
          git push
