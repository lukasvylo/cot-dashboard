on:
  schedule:
    - cron: '0 21 * * 5'
  workflow_dispatch:

jobs:
  update-cot-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests pandas

      - name: Run update
        run: python update_data.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cot_supplemental.csv
          git diff --staged --quiet || git commit -m "auto: COT update $(date +'%Y-%m-%d')"
          git push
